<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Dashboard</title>
  <link rel="stylesheet" href="/styles.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
  <div class="glass start-card">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none">
      <circle cx="5" cy="17" r="3" stroke="white" stroke-width="1.5"/>
      <circle cx="19" cy="17" r="3" stroke="white" stroke-width="1.5"/>
      <path d="M5 17L10 10L14 17M10 10H14" stroke="white" stroke-width="1.5"/>
    </svg>
    <h1>Hello, Emmett</h1>
    <button onclick="startApp()">Start</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app hidden" id="app">

  <!-- SPEED -->
  <div class="glass card">
    <h1 class="speed" id="speed">0</h1>
    <p class="label">MPH</p>
  </div>

  <!-- STATS -->
  <div class="glass stats">
    <div>
      <p>Distance</p>
      <h2 id="distance">0.00 mi</h2>
    </div>
    <div>
      <p>Time</p>
      <h2 id="time">00:00</h2>
    </div>
    <div>
      <p>Avg</p>
      <h2 id="avg">0.0</h2>
    </div>
  </div>

  <!-- MAP -->
  <div id="map" class="glass map"></div>

  <!-- START/STOP -->
  <button class="ride-btn" onclick="toggleRide()" id="rideBtn">Start Ride</button>

</div>

<script>
let speedEl = document.getElementById("speed");
let distanceEl = document.getElementById("distance");
let timeEl = document.getElementById("time");
let avgEl = document.getElementById("avg");

let map, marker, polyline;
let rideActive = false;

let startTime, timer;
let totalDistance = 0;
let lastPosition = null;
let path = [];

// START APP
function startApp() {
  document.getElementById("startScreen").classList.add("fade-out");
  setTimeout(() => {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
    initMap();
  }, 500);
}

// MAP
function initMap() {
  map = L.map('map').setView([0,0], 15);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  marker = L.marker([0,0]).addTo(map);
  polyline = L.polyline([], {color: 'white'}).addTo(map);
}

// TRACKING
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(position => {
    let lat = position.coords.latitude;
    let lng = position.coords.longitude;
    let speed = position.coords.speed;

    // speed display
    if (speed !== null) {
      let mph = speed * 2.237;
      speedEl.textContent = mph.toFixed(1);
    }

    if (map) {
      marker.setLatLng([lat, lng]);
      map.setView([lat, lng]);
    }

    if (rideActive) {
      let newPoint = [lat, lng];
      path.push(newPoint);
      polyline.setLatLngs(path);

      if (lastPosition) {
        totalDistance += getDistance(lastPosition, newPoint);
        distanceEl.textContent = (totalDistance * 0.000621371).toFixed(2) + " mi";
      }

      lastPosition = newPoint;
    }
  });
}

// DISTANCE CALC (meters)
function getDistance(a, b) {
  let R = 6371000;
  let dLat = (b[0]-a[0]) * Math.PI/180;
  let dLon = (b[1]-a[1]) * Math.PI/180;

  let lat1 = a[0] * Math.PI/180;
  let lat2 = b[0] * Math.PI/180;

  let x = Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.sin(dLon/2) * Math.sin(dLon/2) *
          Math.cos(lat1) * Math.cos(lat2);

  let y = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
  return R * y;
}

// START / STOP RIDE
function toggleRide() {
  rideActive = !rideActive;
  let btn = document.getElementById("rideBtn");

  if (rideActive) {
    btn.textContent = "Stop Ride";

    startTime = Date.now();
    timer = setInterval(updateTime, 1000);

    totalDistance = 0;
    path = [];
    polyline.setLatLngs([]);
    lastPosition = null;

  } else {
    btn.textContent = "Start Ride";
    clearInterval(timer);
  }
}

// TIME + AVG SPEED
function updateTime() {
  let elapsed = Math.floor((Date.now() - startTime)/1000);

  let mins = Math.floor(elapsed / 60);
  let secs = elapsed % 60;

  timeEl.textContent =
    String(mins).padStart(2,'0') + ":" +
    String(secs).padStart(2,'0');

  let hours = elapsed / 3600;
  let miles = totalDistance * 0.000621371;

  if (hours > 0) {
    avgEl.textContent = (miles / hours).toFixed(1);
  }
}
</script>

</body>
</html>
